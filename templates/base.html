<!DOCTYPE html>
<html>
<head>
    <title>Cindrella Foot Wears</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f3f4f6;
        }

        /* NAVBAR */
        .navbar {
            background: #0f172a;
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar .logo {
            font-size: 20px;
            font-weight: 700;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
            font-weight: 500;
        }

        .navbar a:hover {
            color: #fbbf24;
        }

        /* PAGE CONTAINER */
        .container {
            padding: 25px;
        }

        h2 {
            margin-bottom: 20px;
            color: #111827;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 20px;
        }

        /* PRODUCT CARD */
        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-6px);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card-content {
            padding: 12px;
        }

        .card h3 {
            font-size: 16px;
            margin-bottom: 5px;
        }

        .price {
            color: #16a34a;
            font-weight: 700;
            margin-bottom: 10px;
        }

        /* BUTTON */
        button {
            background: #f59e0b;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background: #d97706;
        }

        /* FORM STYLE (ADMIN) */
        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        form {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        /* FOOTER */
        .footer {
            text-align: center;
            padding: 15px;
            background: #0f172a;
            color: white;
            margin-top: 30px;
        }

    </style>
</head>

<body>

<div class="navbar">
    <div class="logo">👟 Cindrella Foot Wears</div>
    <div>
        <a href="/">Home</a>
        <a href="/products">Products</a>
        <a href="/cart">Cart</a>
        <a href="/admin">Admin</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

<div class="footer">
    📍 Matunga, Mumbai | Cindrella Foot Wears
</div>

</body>
</html>
